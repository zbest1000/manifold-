# Manifold — full local test stack.
#
#   docker compose up --build
#   → open http://localhost:5000
#
# Brings up the app plus a Mosquitto MQTT broker, a Microsoft OPC-PLC OPC UA
# server, and a data simulator. The app is pre-seeded to auto-connect to the
# broker and OPC UA server, and the simulator publishes MQTT + Sparkplug B
# traffic, so every view has live data immediately.

services:
  mqtt:
    image: eclipse-mosquitto:2
    container_name: manifold-mqtt
    hostname: mqtt
    restart: unless-stopped
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    ports:
      - "1883:1883" # MQTT (connect external clients here too)
      - "9001:9001" # MQTT over WebSockets
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -t healthcheck -m ok || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 3s

  opcua:
    image: mcr.microsoft.com/iotedge/opc-plc:latest
    container_name: manifold-opcua
    hostname: opcua
    restart: unless-stopped
    command:
      - "--pn=50000"            # listen on :50000
      - "--autoaccept"          # auto-accept client certs (test only)
      - "--unsecuretransport"   # expose a None-security endpoint
      - "--sph"                 # show simulator node info on startup
    ports:
      - "50000:50000" # OPC UA (opc.tcp://localhost:50000)

  simulator:
    build:
      context: ./docker/simulator
    container_name: manifold-simulator
    restart: unless-stopped
    environment:
      MQTT_URL: mqtt://mqtt:1883
      TICK_MS: "1500"
      # Bigger dataset for load testing (1 ~= 350 topics, 3 ~= 1000).
      SIM_SCALE: "3"
    depends_on:
      mqtt:
        condition: service_healthy

  # Mock CESMII i3X server. Connect from the app at http://i3x:8080 (i3X page or
  # Discovery, which probes port 8080). Serves a small ISA-95 object hierarchy.
  i3x:
    build:
      context: ./docker/i3x-mock
    container_name: manifold-i3x
    hostname: i3x
    restart: unless-stopped
    environment:
      PORT: "8080"
    ports:
      # Host loopback so you can `curl http://localhost:18080/info` directly. The
      # app reaches it in-cluster as http://i3x:8080 regardless of this mapping.
      - "127.0.0.1:18080:8080"

  # Mock CESMII SMIP GraphQL server. Connect from the CESMII SMIP page with
  # endpoint http://cesmii-mock:4000/graphql (any credentials are accepted).
  cesmii-mock:
    build:
      context: ./docker/cesmii-mock
    container_name: manifold-cesmii-mock
    hostname: cesmii-mock
    restart: unless-stopped
    environment:
      PORT: "4000"
    ports:
      # Host loopback so you can `curl http://localhost:14000/graphql` directly.
      # The app reaches it in-cluster as http://cesmii-mock:4000 regardless.
      - "127.0.0.1:14000:4000"

  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: manifold-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "5000"
      MANIFOLD_DATA_DIR: /data
      # Bind all interfaces INSIDE the container so the port mapping works; the
      # host-side mapping below (127.0.0.1) is what keeps it off the network.
      MANIFOLD_HOST: "0.0.0.0"
      # This is a local-only demo (mapped to host loopback), so let Discovery scan
      # the demo's Docker subnet and reach the bundled broker/OPC UA. The shipped
      # default is fail-closed — do NOT set this on an internet-exposed instance.
      MANIFOLD_ALLOW_PRIVATE_TARGETS: "1"
      # This demo runs UNAUTHENTICATED. To expose it beyond this host you MUST
      # set a token AND widen the port mapping below to "5000:5000".
      # MANIFOLD_AUTH_TOKEN: set-a-secret-to-require-auth
    volumes:
      - app-data:/data # persists connection profiles across restarts
    ports:
      # Host loopback only — reachable at http://localhost:5000 but NOT from other
      # machines on the LAN. Widen to "5000:5000" only after setting a token.
      - "127.0.0.1:5000:5000"
    depends_on:
      mqtt:
        condition: service_healthy
      opcua:
        condition: service_started

volumes:
  app-data:
