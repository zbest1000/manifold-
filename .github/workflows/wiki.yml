name: Wiki

# The GitHub wiki is generated from docs/wiki/ so pages are reviewed in PRs
# like any other change. This job mirrors that directory into the wiki git
# repository whenever it changes.

on:
  push:
    branches: [main, 'claude/**']
    paths: ['docs/wiki/**', '.github/workflows/wiki.yml']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Sync docs/wiki to the GitHub wiki
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Push pages to the wiki repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git" wiki-repo || {
            echo "::error::wiki git repo not found — open the repo's Wiki tab and create the first page once, then re-run this workflow"
            exit 1
          }
          rsync -a --delete --exclude .git docs/wiki/ wiki-repo/
          cd wiki-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "wiki already up to date"
            exit 0
          fi
          git commit -m "Sync wiki from docs/wiki @ ${GITHUB_SHA::8}"
          git push
