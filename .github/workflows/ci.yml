name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server (tests)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Node 22 LTS only. Node 18 lacks the require(ESM) support node-opcua
        # needs; Node 20 reached end-of-life in April 2026 and its test runner
        # has an IPC bug ("Unable to deserialize cloned data") that fails whole
        # files at random — an EOL runtime isn't worth flaky signal.
        node-version: [22.x]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install server dependencies
        working-directory: server
        run: npm install --no-audit --no-fund
      - name: Run server tests
        working-directory: server
        run: npm test

  client:
    name: Client (tests + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - name: Install client dependencies
        working-directory: client
        run: npm install --no-audit --no-fund
      - name: Run client tests
        working-directory: client
        run: npm test
      - name: Build client
        working-directory: client
        run: npm run build

  mcp:
    name: MCP server (load check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - name: Install MCP dependencies
        working-directory: mcp
        run: npm install --no-audit --no-fund
      - name: Verify MCP server starts and registers tools
        working-directory: mcp
        run: node --check index.js
